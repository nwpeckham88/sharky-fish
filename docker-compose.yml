services:
  sharky-fish:
    build: .
    image: sharky-fish:latest
    container_name: sharky-fish
    restart: unless-stopped
    # Run unprivileged for better host security.
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    # NVIDIA GPU Passthrough (Uncomment if using NVIDIA)
    # runtime: nvidia
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu, video, compute]
    # Orange Pi 5 Pro / RK3588 hardware acceleration (uncomment what exists on host)
    devices:
      - /dev/dri:/dev/dri
      # Optional Rockchip nodes (enable only if present on host)
      # - /dev/mpp_service:/dev/mpp_service
      # - /dev/rga:/dev/rga
      - /dev/dma_heap:/dev/dma_heap
    ports:
      - "3000:3000"
    volumes:
      - /mnt/nas/servarr/data:/data:rw
      - /opt/sharky/config:/config:rw
